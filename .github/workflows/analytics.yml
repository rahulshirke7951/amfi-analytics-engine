name: Build Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * *"   # 16:45 UTC = 10:15 PM IST

permissions:
  contents: write

jobs:
  build-analytics:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python Setup ────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Pip Cache (saves ~30-45s per run) ──────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Historic DB Cache ───────────────────────────────────────────────
      #    Key tied to config.json hash — auto-invalidates if URL changes
      - name: Cache Historic Database
        id: cache-db
        uses: actions/cache@v4
        with:
          path: historic.db
          key: ${{ runner.os }}-historic-db-${{ hashFiles('config.json') }}

      # ── 5. Install Dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas==2.2.2 \
            requests==2.32.3 \
            gdown==5.2.0 \
            xlsxwriter==3.2.0 \
            openpyxl==3.1.2

      # ── 6. Validate Script Exists ──────────────────────────────────────────
      - name: Validate script path
        run: |
          test -f scripts/build_dashboard_data.py || {
            echo "❌ ERROR: scripts/build_dashboard_data.py not found."
            echo "Check your repo structure and script path."
            exit 1
          }

      # ── 7. Run Analytics ───────────────────────────────────────────────────
      - name: Run Analytics Script
        run: python scripts/build_dashboard_data.py

      # ── 8. Commit Output ───────────────────────────────────────────────────
      - name: Commit Dashboard Output
        run: |
          if [ ! -f output/dashboard_data.xlsx ]; then
            echo "❌ output/dashboard_data.xlsx was not produced. Failing."
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/dashboard_data.xlsx

          if git diff --staged --quiet; then
            echo "✅ No changes in output. Skipping commit."
          else
            git commit -m "chore: update dashboard data $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push --force-with-lease origin main
          fi
