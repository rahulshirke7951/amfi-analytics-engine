name: Build Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * *"

permissions:
  contents: write

jobs:
  build-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests gdown

      - name: Run Analytics Script
        run: |
          python scripts/build_dashboard_data.py
          echo "=========================================="
          echo "DATA SUMMARY"
          echo "=========================================="
          python -c "import pandas as pd; df=pd.read_excel('output/dashboard_data.xlsx'); print(f'Total Schemes: {len(df)}'); print(f'AMCs Found: {df[\'amc_name\'].nunique()}'); print(f'Direct Plans: {len(df[df[\'plan_type\'] == \'Direct Plan\'])}')"

      - name: Commit Dashboard Output
        run: |
          if [ -f output/dashboard_data.xlsx ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add output/dashboard_data.xlsx
            git diff --staged --quiet || (git commit -m "Update dashboard data [skip ci]" && git push)
          else
            echo "No dashboard file found. Skipping commit."
          fi
