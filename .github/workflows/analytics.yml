name: Build Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * *"

permissions:
  contents: write

jobs:
  build-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Historic Database
        id: cache-db
        uses: actions/cache@v3
        with:
          path: historic.db
          key: ${{ runner.os }}-historic-db-${{ hashFiles('config.json') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests gdown xlsxwriter

      - name: Run Analytics Script
        run: |
          python scripts/build_dashboard_data.py

      - name: Commit Dashboard Output
        run: |
          if [ -f output/dashboard_data.xlsx ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add output/dashboard_data.xlsx
            
            if ! git diff --staged --quiet; then
              git commit -m "Update dashboard data [skip ci]"
              git pull --rebase -X ours origin main
              git push origin main
            else
              echo "No changes. Skipping commit."
            fi
          fi
