name: Build Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * *"   # 16:45 UTC = 10:15 PM IST

# Explicitly scope minimal required permissions
permissions:
  contents: write

env:
  # Increment this version number (e.g., v2) to instantly force-clear all pipeline caches
  CACHE_VERSION: v1

jobs:
  build-analytics:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (Pinned to v4.2.2 SHA) ─────────────────────────────────
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Fetches full history for proper branch tracking

      # ── 2. Python Setup (Pinned to v5.3.0 SHA) ─────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@0b93645e9fa2c7931d54e5003562b41161d4b88a # v5.3.0
        with:
          python-version: "3.11"

      # ── 3. Pip Cache ───────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-

      # ── 4. Consolidated Reference DB Cache ─────────────────────────────────
      # Caches both static databases together. Updates if config.json or CACHE_VERSION changes.
      - name: Cache Reference Databases
        id: cache-dbs
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            historic.db
            amfi01jun2026.db
          key: ${{ runner.os }}-db-cache-${{ env.CACHE_VERSION }}-${{ hashFiles('config.json', 'scripts/build_dashboard_data.py') }}

      # ── 5. Install Dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install \
              pandas==2.2.2 \
              requests==2.32.3 \
              gdown==5.2.0 \
              xlsxwriter==3.2.0 \
              openpyxl==3.1.2
          fi

      # ── 6. Validate Script Exists ──────────────────────────────────────────
      - name: Validate script path
        run: |
          test -f scripts/build_dashboard_data.py || {
            echo "❌ ERROR: scripts/build_dashboard_data.py not found."
            echo "Check your repo structure and script path."
            exit 1
          }

      # ── 7. Run Analytics ───────────────────────────────────────────────────
      - name: Run Analytics Script
        run: python scripts/build_dashboard_data.py

      # ── 8. Commit and Controlled Push ──────────────────────────────────────
      - name: Commit Dashboard Output
        run: |
          if [ ! -f output/dashboard_data.xlsx ]; then
            echo "❌ output/dashboard_data.xlsx was not produced. Failing."
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/dashboard_data.xlsx

          if git diff --staged --quiet; then
            echo "✅ No changes in output. Skipping commit."
          else
            git commit -m "chore: update dashboard data $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            
            # Safely fetch and rebase right before pushing to manage any concurrent human commits
            git fetch origin main
            git rebase origin/main || {
              echo "⚠️ Conflict detected during rebase. Pulling remote branch to settle quietly..."
              git stash
              git pull --rebase origin main
              git stash pop
            }
            
            git push origin main
          fi
