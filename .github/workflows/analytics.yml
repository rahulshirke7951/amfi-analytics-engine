name: Build Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * *"

permissions:
  contents: write

jobs:
  build-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so rebase works smoothly

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests gdown

      - name: Run Analytics Script
        run: |
          python scripts/build_dashboard_data.py

      - name: Commit Dashboard Output
        run: |
          if [ -f output/dashboard_data.xlsx ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add output/dashboard_data.xlsx
            
            # Check if there are changes to commit
            if ! git diff --staged --quiet; then
              git commit -m "Update dashboard data [skip ci]"
              # Pull latest changes from remote to avoid the 'rejected' error
              git pull --rebase origin main
              git push origin main
            else
              echo "No changes detected in Excel file. Skipping."
            fi
          else
            echo "No dashboard file found. Skipping commit."
            exit 1 # Fail the job if the file was never created
          fi
