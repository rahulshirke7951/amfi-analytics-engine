name: Build Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * *"   # 10:15 PM IST

permissions:
  contents: write

env:
  CACHE_VERSION: v1

jobs:
  build-analytics:
    runs-on: ubuntu-latest

    steps:
      # ────────────────────────────────────────────────────────────
      # Checkout
      # ────────────────────────────────────────────────────────────
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ────────────────────────────────────────────────────────────
      # Python
      # ────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ────────────────────────────────────────────────────────────
      # Pip Cache
      # ────────────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-

      # ────────────────────────────────────────────────────────────
      # Historic DB Cache
      # ────────────────────────────────────────────────────────────
      - name: Cache Historic Database
        uses: actions/cache@v4
        with:
          path: historic.db
          key: ${{ runner.os }}-historic-db-${{ env.CACHE_VERSION }}-${{ hashFiles('config.json') }}

      # ────────────────────────────────────────────────────────────
      # AMFI 01-Jun DB Cache
      # ────────────────────────────────────────────────────────────
      - name: Cache AMFI Database
        uses: actions/cache@v4
        with:
          path: amfi01jun2026.db
          key: ${{ runner.os }}-amfi-db-${{ env.CACHE_VERSION }}

      # ────────────────────────────────────────────────────────────
      # Install Dependencies
      # ────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install \
              pandas==2.2.2 \
              requests==2.32.3 \
              gdown==5.2.0 \
              xlsxwriter==3.2.0 \
              openpyxl==3.1.2
          fi

      # ────────────────────────────────────────────────────────────
      # Validate Script
      # ────────────────────────────────────────────────────────────
      - name: Validate script path
        run: |
          test -f scripts/build_dashboard_data.py || {
            echo "❌ ERROR: scripts/build_dashboard_data.py not found"
            exit 1
          }

      # ────────────────────────────────────────────────────────────
      # Show Cached Files
      # ────────────────────────────────────────────────────────────
      - name: Show database files
        run: |
          ls -lh *.db || true

      # ────────────────────────────────────────────────────────────
      # Run Analytics
      # ────────────────────────────────────────────────────────────
      - name: Run Analytics Script
        run: python scripts/build_dashboard_data.py

      # ────────────────────────────────────────────────────────────
      # Verify Output
      # ────────────────────────────────────────────────────────────
      - name: Verify Output
        run: |
          test -f output/dashboard_data.xlsx || {
            echo "❌ dashboard_data.xlsx not generated"
            exit 1
          }

      # ────────────────────────────────────────────────────────────
      # Commit Output
      # ────────────────────────────────────────────────────────────
      - name: Commit Dashboard Output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/dashboard_data.xlsx

          if git diff --staged --quiet; then
            echo "✅ No changes detected"
            exit 0
          fi

          git commit -m "chore: update dashboard data $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"

          git fetch origin main
          git rebase origin/main || {
            echo "⚠️ Rebase conflict. Retrying..."
            git rebase --abort || true
            git pull --rebase origin main
          }

          git push origin main
