name: Single Scheme Production Audit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas openpyxl requests gdown xlsxwriter

      - name: Run Script
        run: python scripts/debug_audit_history.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: single-scheme-audit
          path: output/single_scheme_production_equivalent.xlsx

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Commit and Push Report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/single_scheme_production_equivalent.xlsx
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update single scheme audit for $(jq -r '.audit_scheme_code' config.json)"
            git push
          fi
