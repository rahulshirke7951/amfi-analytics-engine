name: Debug Single Scheme Audit

on:
  workflow_dispatch:
    inputs:
      scheme_code:
        description: "Enter Scheme Code (e.g. 140088)"
        required: true
        type: string

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pandas requests gdown openpyxl xlsxwriter

      - name: Run Debug Script
        env:
          SCHEME_CODE: ${{ github.event.inputs.scheme_code }}
        run: |
          python debug_audit_history.py $SCHEME_CODE

      - name: Upload Debug Output
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.event.inputs.scheme_code }}
          path: debug_output/
